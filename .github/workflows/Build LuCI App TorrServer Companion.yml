name: Build LuCI App TorrServer Companion

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Package version, e.g. 1.2.3'
        required: true
        default: '1.2.3'

jobs:
  release:
    name: Build and Release luci-app-torrserver
    runs-on: ubuntu-latest
    permissions:
      contents: write

    env:
      PKG_NAME: luci-app-torrserver
      PKG_ARCH_IPK: all
      PKG_ARCH_APK: noarch

    steps:
      - name: Resolve package metadata
        shell: bash
        run: |
          set -euxo pipefail

          PKG_VERSION="${{ github.event.inputs.version }}"
          RELEASE_TAG="v${PKG_VERSION}"
          RELEASE_NAME="LuCI App TorrServer ${PKG_VERSION}"

          {
            echo "PKG_VERSION=${PKG_VERSION}"
            echo "RELEASE_TAG=${RELEASE_TAG}"
            echo "RELEASE_NAME=${RELEASE_NAME}"
          } >> "${GITHUB_ENV}"

      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Install packaging tools
        shell: bash
        run: |
          set -euxo pipefail

          sudo apt-get update
          sudo apt-get install -y curl tar xz-utils dos2unix

          NFPM_VER="2.43.1"
          curl -fsSL "https://github.com/goreleaser/nfpm/releases/download/v${NFPM_VER}/nfpm_${NFPM_VER}_Linux_x86_64.tar.gz" | tar -xz
          sudo install -m 0755 nfpm /usr/local/bin/nfpm

      - name: Generate LuCI app files
        shell: bash
        run: |
          set -euxo pipefail

          mkdir -p \
            root/usr/lib/lua/luci/controller \
            root/usr/lib/lua/luci/model/cbi \
            packaging

          # ---------------------------------------------------------------------------
          # CONTROLLER
          # Исправления:
          #   1. require "nixio" явно — nixio.nanosleep больше не падает
          #   2. data.pid добавлен в JSON-ответ action_status
          #   3. nixio.nanosleep заменён на os.execute("sleep N") для надёжности
          #      на минимальных сборках где nixio.nanosleep может отсутствовать
          # ---------------------------------------------------------------------------
          cat > root/usr/lib/lua/luci/controller/torrserver.lua <<'LUA_CONTROLLER'
module("luci.controller.torrserver", package.seeall)

local nixio = require "nixio"

function index()
    entry({"admin", "services", "torrserver"}, cbi("torrserver"), _("TorrServer"), 60)
    entry({"admin", "services", "torrserver", "status"},  call("action_status")).leaf  = true
    entry({"admin", "services", "torrserver", "start"},   call("action_start")).leaf   = true
    entry({"admin", "services", "torrserver", "stop"},    call("action_stop")).leaf    = true
    entry({"admin", "services", "torrserver", "restart"}, call("action_restart")).leaf = true
    entry({"admin", "services", "torrserver", "get_log"}, call("action_log")).leaf     = true
end

local function json_out(tbl)
    local http = require "luci.http"
    http.prepare_content("application/json")
    http.write_json(tbl)
end

local function have_exec(path)
    return nixio.fs.access(path, "x")
end

function action_start()
    local sys = require "luci.sys"
    if not have_exec("/etc/init.d/torrserver") then
        return json_out({ ok = false, error = "init script not found: /etc/init.d/torrserver" })
    end
    sys.call("/etc/init.d/torrserver start >/dev/null 2>&1")
    os.execute("sleep 1")
    json_out({ ok = true })
end

function action_stop()
    local sys = require "luci.sys"
    if not have_exec("/etc/init.d/torrserver") then
        return json_out({ ok = false, error = "init script not found: /etc/init.d/torrserver" })
    end
    sys.call("/etc/init.d/torrserver stop >/dev/null 2>&1")
    os.execute("sleep 1")
    json_out({ ok = true })
end

function action_restart()
    local sys = require "luci.sys"
    if not have_exec("/etc/init.d/torrserver") then
        return json_out({ ok = false, error = "init script not found: /etc/init.d/torrserver" })
    end
    sys.call("/etc/init.d/torrserver restart >/dev/null 2>&1")
    os.execute("sleep 2")
    json_out({ ok = true })
end

function action_log()
    local sys  = require "luci.sys"
    local http = require "luci.http"

    local log = sys.exec("logread -e torrserver 2>/dev/null | tail -n 200")
    if not log or #log == 0 then
        log = "Лог пуст. Сервис не запущен или сообщения вытеснены другими событиями."
    end

    http.prepare_content("text/plain; charset=utf-8")
    http.write(log)
end

function action_status()
    local sys  = require "luci.sys"
    local json = require "luci.jsonc"

    local bin_present    = have_exec("/usr/bin/torrserver")
    local init_present   = have_exec("/etc/init.d/torrserver")
    local config_present = nixio.fs.access("/etc/config/torrserver")

    -- FIX: pid теперь кладётся в data и возвращается клиенту
    local pid = sys.exec("pidof torrserver 2>/dev/null | awk '{print $1}'"
                         ):gsub("%s+", "")

    local data = {
        running        = false,
        pid            = nil,
        bin_present    = bin_present    and true or false,
        init_present   = init_present   and true or false,
        config_present = config_present and true or false,
        ts_cpu         = "0",
        mem_kb         = 0,
        sys_mem        = { total = 0, free = 0, available = 0 },
        cores          = { 0, 0, 0, 0 },
    }

    if pid and #pid > 0 then
        if sys.call("test -d /proc/" .. pid) == 0 then
            data.running = true
            data.pid     = pid
        else
            pid = nil
        end
    end

    -- /proc/meminfo
    for line in io.lines("/proc/meminfo") do
        local k, v = line:match("([^:]+):%s+(%d+)")
        if k == "MemTotal"     then data.sys_mem.total     = tonumber(v) end
        if k == "MemFree"      then data.sys_mem.free      = tonumber(v) end
        if k == "MemAvailable" then data.sys_mem.available = tonumber(v) end
    end
    if not data.sys_mem.available or data.sys_mem.available == 0 then
        data.sys_mem.available = data.sys_mem.free
    end

    -- /proc/stat snapshot
    local cur_sys = {}
    for line in io.lines("/proc/stat") do
        local key, u, n, s, i = line:match("^(cpu%d*)%s+(%d+)%s+(%d+)%s+(%d+)%s+(%d+)")
        if key then
            cur_sys[key] = {
                total = tonumber(u) + tonumber(n) + tonumber(s) + tonumber(i),
                work  = tonumber(u) + tonumber(n) + tonumber(s),
            }
        end
    end

    -- per-process stats
    local cur_proc_total = 0
    if pid then
        local rss = sys.exec(
            "grep VmRSS /proc/" .. pid .. "/status 2>/dev/null | awk '{print $2}'"
        ):gsub("%s+", "")
        data.mem_kb = tonumber(rss) or 0

        local f = io.open("/proc/" .. pid .. "/stat", "r")
        if f then
            local content = f:read("*l") or ""
            f:close()
            local parts = {}
            for part in content:gmatch("%S+") do parts[#parts + 1] = part end
            cur_proc_total = (tonumber(parts[14]) or 0) + (tonumber(parts[15]) or 0)
        end
    end

    -- delta от предыдущего вызова
    local state_file = "/tmp/ts_monitor_state.json"
    local prev_state = {}
    local f = io.open(state_file, "r")
    if f then
        prev_state = json.parse(f:read("*all")) or {}
        f:close()
    end

    for i = 0, 3 do
        local k = "cpu" .. i
        if cur_sys[k] and prev_state[k] then
            local d_total = cur_sys[k].total - (prev_state[k].total or 0)
            local d_work  = cur_sys[k].work  - (prev_state[k].work  or 0)
            if d_total > 0 then
                data.cores[i + 1] = tonumber(string.format("%.1f", (d_work / d_total) * 100))
            end
        end
    end

    if cur_sys["cpu"] and prev_state["cpu"] and cur_proc_total > 0 and prev_state["proc"] then
        local d_sys_total = cur_sys["cpu"].total - (prev_state["cpu"].total or 0)
        local d_proc      = cur_proc_total        - (prev_state["proc"]     or 0)
        if d_sys_total > 0 then
            local cpu_count = 0
            while cur_sys["cpu" .. cpu_count] do cpu_count = cpu_count + 1 end
            if cpu_count < 1 then cpu_count = 1 end
            data.ts_cpu = string.format("%.1f", (d_proc / d_sys_total) * 100 * cpu_count)
        end
    end

    -- сохраняем snapshot
    local new_state    = cur_sys
    new_state["proc"]  = cur_proc_total
    f = io.open(state_file, "w")
    if f then
        f:write(json.stringify(new_state))
        f:close()
    end

    json_out(data)
end
LUA_CONTROLLER

          # ---------------------------------------------------------------------------
          # MODEL / CBI
          # Исправления:
          #   1. renderButtons использует createElement + addEventListener —
          #      никаких кавычек внутри onclick-атрибутов, кнопки работают
          #   2. forceUpdate/schedulePoll обёрнуты в DOMContentLoaded —
          #      элементы DOM гарантированно существуют к моменту первого poll
          #   3. httpGet через нативный XMLHttpRequest — нет зависимости от
          #      LuCI-глобала XHR, который не всегда инжектируется в compat-окружении
          #   4. PID отображается в карточке статуса
          #   5. Кнопка лога вынесена в html_view рядом с log-box —
          #      toggleLog всегда доступна в scope до нажатия
          # ---------------------------------------------------------------------------
          cat > root/usr/lib/lua/luci/model/cbi/torrserver.lua <<'LUA_MODEL'
m = Map("torrserver", translate("TorrServer"), translate("Панель управления TorrServer"))

local uci = require "luci.model.uci".cursor()
local sys = require "luci.sys"
local dsp = require "luci.dispatcher"
local fs  = require "nixio.fs"

local function safe_num_port(v)
    local p = tonumber(v)
    if not p or p < 1 or p > 65535 then return "8090" end
    return tostring(math.floor(p))
end

local function safe_host(v)
    v = tostring(v or "")
    if v:match("^[%w%._:%-%[%]]+$") then return v end
    return "192.168.1.1"
end

-- экранирование для вставки значений в JS-строки (одинарные кавычки)
local function jsq(s)
    s = tostring(s or "")
    s = s:gsub("\\", "\\\\")
         :gsub("'",  "\\'")
         :gsub('"',  '\\"')
         :gsub("\n", "")
         :gsub("\r", "")
         :gsub("</", "<\\/")
    return s
end

local port   = safe_num_port(uci:get("torrserver", "main", "port") or "8090")
local lan_ip = safe_host(sys.exec("uci -q get network.lan.ipaddr"):gsub("%s+", ""))
local url    = "http://" .. lan_ip .. ":" .. port

local bin_present  = fs.access("/usr/bin/torrserver",    "x")
local init_present = fs.access("/etc/init.d/torrserver", "x")
local cfg_present  = fs.access("/etc/config/torrserver")

local url_status  = dsp.build_url("admin", "services", "torrserver", "status")
local url_start   = dsp.build_url("admin", "services", "torrserver", "start")
local url_stop    = dsp.build_url("admin", "services", "torrserver", "stop")
local url_restart = dsp.build_url("admin", "services", "torrserver", "restart")
local url_log     = dsp.build_url("admin", "services", "torrserver", "get_log")

-- ── Секция-предупреждение (показывается только если daemon не установлен) ──
warn = m:section(TypedSection, "_warn", nil)
warn.anonymous = true

local warning_html = ""
if not bin_present or not init_present then
    warning_html = string.format([[
<div style="margin:0 0 16px 0;padding:12px 14px;border-radius:8px;
            border:1px solid rgba(255,180,0,.45);
            background:rgba(255,180,0,.10);
            color:var(--text-color-high,#f5f5f5);">
    <strong>Нужен установленный TorrServer daemon.</strong><br/>
    Ожидаются:<br/>
    <code>/usr/bin/torrserver</code><br/>
    <code>/etc/init.d/torrserver</code><br/><br/>
    Текущий статус:<br/>
    binary: %s<br/>
    init.d: %s<br/>
    config: %s
</div>]],
        bin_present  and "OK" or "<b>MISSING</b>",
        init_present and "OK" or "<b>MISSING</b>",
        cfg_present  and "OK" or "<b>MISSING</b>"
    )
end

w = warn:option(DummyValue, "_warn_box")
w.rawhtml = true
w.value   = warning_html

-- ── Секция мониторинга ──
s = m:section(NamedSection, "main", "torrserver", translate("Мониторинг"))
s.anonymous = true

local html_view = [[
<style>
    .ts-wrap{display:flex;flex-wrap:wrap;gap:15px;margin-bottom:20px;align-items:stretch}
    .ts-card{
        background:var(--background-color-medium,rgba(255,255,255,.04));
        border:1px solid var(--border-color-medium,rgba(255,255,255,.10));
        border-radius:10px;padding:12px;width:180px;text-align:center;
        box-shadow:0 1px 2px rgba(0,0,0,.15);
        display:flex;flex-direction:column;justify-content:space-between;
        color:var(--text-color-high,#f5f5f5)
    }
    .ts-card.wide{width:250px}
    .ts-head{font-size:10px;color:var(--text-color-medium,#aaa);
             text-transform:uppercase;margin-bottom:8px;font-weight:600}
    .ts-val-big{font-size:22px;font-weight:bold;
                color:var(--text-color-high,#f5f5f5);line-height:1.2}
    .ts-unit{font-size:12px;color:var(--text-color-medium,#aaa);font-weight:normal}
    .ts-sub{font-size:11px;color:var(--text-color-medium,#aaa);margin-top:4px}
    .ts-pid{font-size:10px;color:var(--text-color-medium,#aaa);margin-top:3px;font-family:monospace}
    .mem-bar-bg{background:rgba(255,255,255,.08);height:6px;border-radius:3px;
                overflow:hidden;margin:8px 0 4px}
    .mem-bar-fill{background:#2196F3;height:100%;width:0%;transition:width .5s ease-in-out}
    .cores-grid{display:flex;gap:6px;height:80px;align-items:flex-end;
                justify-content:center;margin-top:5px}
    .core-col{width:22px;display:flex;flex-direction:column;
              align-items:center;height:100%;justify-content:flex-end}
    .core-track{width:100%;height:65px;background:rgba(255,255,255,.06);
                position:relative;border-radius:3px;overflow:hidden;
                border:1px solid rgba(255,255,255,.08);
                display:flex;flex-direction:column-reverse}
    .core-fill{width:100%;background:#4caf50;height:0%;
               transition:height .4s ease-out}
    .core-num{font-size:10px;color:var(--text-color-medium,#aaa);
              margin-top:4px;font-weight:bold}
    .ctrl-panel{margin-top:15px;display:flex;justify-content:space-between;
                gap:8px;width:100%}
    .btn-action{flex:1;padding:8px 0;border:none;border-radius:4px;color:#fff;
                cursor:pointer;font-size:11px;font-weight:bold;
                text-transform:uppercase;transition:opacity .2s,filter .2s;
                text-align:center}
    .btn-action:hover{opacity:.9}
    .btn-start{background-color:#4caf50}
    .btn-stop{background-color:#f44336}
    .btn-restart{background-color:#ff9800}
    .btn-disabled{background-color:#666!important;color:#ddd!important;
                  cursor:wait!important;filter:grayscale(100%)}
    .log-toggle-btn{margin-top:8px;padding:5px 10px;border:none;border-radius:4px;
                    background:rgba(255,255,255,.08);color:var(--text-color-high,#f5f5f5);
                    cursor:pointer;font-size:11px;width:100%}
    .log-toggle-btn:hover{background:rgba(255,255,255,.15)}
    .log-box{width:100%;box-sizing:border-box;margin-top:10px;
             background:rgba(0,0,0,.4);color:#f8f8f2;border-radius:8px;
             padding:10px;font-family:monospace;font-size:11px;
             height:300px;overflow-y:auto;white-space:pre-wrap;display:none;
             border:1px solid rgba(255,255,255,.08);text-align:left}
</style>

<div class="ts-wrap">

    <div class="ts-card">
        <div class="ts-head">Сервис</div>
        <div id="ts_status" class="ts-val-big" style="font-size:16px;">...</div>
        <div class="ts-pid" id="ts_pid"></div>
        <div class="ctrl-panel" id="ctrl_panel"></div>
        <button type="button" class="log-toggle-btn" id="log_toggle_btn"
                onclick="tsToggleLog()">Журнал ▾</button>
    </div>

    <div class="ts-card wide">
        <div class="ts-head">Оперативная память</div>
        <div><span id="ts_mem" class="ts-val-big">0</span>
             <span class="ts-unit">MB (TorrServer)</span></div>
        <div class="mem-bar-bg">
            <div id="mem_bar" class="mem-bar-fill"></div>
        </div>
        <div class="ts-sub" id="mem_details">Free: 0 MB | Total: 0 MB</div>
    </div>

    <div class="ts-card">
        <div class="ts-head">Процессор (TS)</div>
        <div class="ts-val-big">
            <span id="ts_cpu">0</span><span class="ts-unit">%</span>
        </div>
        <div class="ts-sub">Нагрузка процесса</div>
    </div>

    <div class="ts-card">
        <div class="ts-head">Ядра (System)</div>
        <div class="cores-grid">
            <div class="core-col">
                <div class="core-track"><div id="c0" class="core-fill"></div></div>
                <div class="core-num">0</div>
            </div>
            <div class="core-col">
                <div class="core-track"><div id="c1" class="core-fill"></div></div>
                <div class="core-num">1</div>
            </div>
            <div class="core-col">
                <div class="core-track"><div id="c2" class="core-fill"></div></div>
                <div class="core-num">2</div>
            </div>
            <div class="core-col">
                <div class="core-track"><div id="c3" class="core-fill"></div></div>
                <div class="core-num">3</div>
            </div>
        </div>
        <div id="cores_txt" class="ts-sub" style="margin-top:5px;font-size:9px;">
            0% | 0% | 0% | 0%
        </div>
    </div>

</div>

<div id="ts_log" class="log-box"></div>

<script type="text/javascript">
(function() {
    /* ── константы ── */
    var U_STAT    = ']] .. jsq(url_status)  .. [[';
    var U_START   = ']] .. jsq(url_start)   .. [[';
    var U_STOP    = ']] .. jsq(url_stop)    .. [[';
    var U_RESTART = ']] .. jsq(url_restart) .. [[';
    var U_LOG     = ']] .. jsq(url_log)     .. [[';

    var pendingAction = null;
    var fastPollUntil = 0;
    var logVisible    = false;

    /* ── утилиты ── */
    function nowSec()        { return Math.floor(Date.now() / 1000); }
    function setFastPoll(s)  { fastPollUntil = nowSec() + s; }
    function nextPollDelay() { return (nowSec() < fastPollUntil) ? 1000 : 3000; }

    function getColor(pct) {
        if (pct > 80) return '#f44336';
        if (pct > 50) return '#ff9800';
        return '#4caf50';
    }

    function el(id) { return document.getElementById(id); }

    function setBarHeight(id, pct) {
        var e = el(id);
        if (!e) return;
        var h = Math.min(Math.max(Math.round(pct), 0), 100);
        e.style.height = h + '%';
        e.style.backgroundColor = getColor(h);
    }

    /* ── HTTP ── */
    function httpGet(url, cb) {
        var xhr = new XMLHttpRequest();
        xhr.open('GET', url, true);
        xhr.onreadystatechange = function() {
            if (xhr.readyState !== 4) return;
            var data = null;
            try { data = JSON.parse(xhr.responseText); } catch (e) {}
            if (cb) cb(xhr, data);
        };
        xhr.send(null);
    }

    function httpGetText(url, cb) {
        var xhr = new XMLHttpRequest();
        xhr.open('GET', url, true);
        xhr.onreadystatechange = function() {
            if (xhr.readyState !== 4) return;
            if (cb) cb(xhr.responseText || '');
        };
        xhr.send(null);
    }

    /* ── кнопки управления сервисом ──
       FIX: createElement + addEventListener вместо innerHTML с onclick="srv(\'...')"
       — полностью исключает проблему экранирования кавычек в Lua [[ ]]            */
    function makeBtn(id, cls, label, action) {
        var b = document.createElement('button');
        b.type      = 'button';
        b.id        = id;
        b.className = 'btn-action ' + cls;
        b.textContent = label;
        b.addEventListener('click', function() { tsrv(action); });
        return b;
    }

    function setButtonsBusy(label) {
        ['btn_start','btn_stop','btn_restart'].forEach(function(id) {
            var b = el(id);
            if (!b) return;
            b.disabled = true;
            b.classList.add('btn-disabled');
        });
        if (pendingAction) {
            var active = el('btn_' + pendingAction);
            if (active) active.textContent = label;
        }
    }

    function clearButtonsBusy() {
        ['btn_start','btn_stop','btn_restart'].forEach(function(id) {
            var b = el(id);
            if (!b) return;
            b.disabled = false;
            b.classList.remove('btn-disabled');
        });
    }

    function renderButtons(running, controlsAllowed) {
        var p = el('ctrl_panel');
        if (!p) return;
        p.innerHTML = '';

        if (!controlsAllowed) {
            var d = document.createElement('button');
            d.type      = 'button';
            d.className = 'btn-action btn-disabled';
            d.disabled  = true;
            d.textContent = 'Daemon missing';
            p.appendChild(d);
            return;
        }

        if (running) {
            p.appendChild(makeBtn('btn_stop',    'btn-stop',    'Stop',    'stop'));
            p.appendChild(makeBtn('btn_restart',  'btn-restart', 'Restart', 'restart'));
        } else {
            p.appendChild(makeBtn('btn_start', 'btn-start', 'Start', 'start'));
        }

        if (pendingAction === 'start')   setButtonsBusy('Starting...');
        if (pendingAction === 'stop')    setButtonsBusy('Stopping...');
        if (pendingAction === 'restart') setButtonsBusy('Restarting...');
    }

    /* ── действия ── */
    function tsrv(action) {
        pendingAction = action;
        setFastPoll(15);
        renderButtons(false, true);

        if (action === 'start')   setButtonsBusy('Starting...');
        if (action === 'stop')    setButtonsBusy('Stopping...');
        if (action === 'restart') setButtonsBusy('Restarting...');

        var url = action === 'start'   ? U_START
                : action === 'stop'    ? U_STOP
                :                        U_RESTART;

        httpGet(url, function(xhr, data) {
            if (data && data.ok === false) {
                pendingAction = null;
                clearButtonsBusy();
                forceUpdate();
                return;
            }
            setTimeout(forceUpdate, 600);
            setTimeout(forceUpdate, 1400);
            setTimeout(forceUpdate, 2800);
        });
    }

    /* ── лог ── */
    window.tsToggleLog = function() {
        var box = el('ts_log');
        var btn = el('log_toggle_btn');
        if (!box) return;
        logVisible = !logVisible;
        box.style.display = logVisible ? 'block' : 'none';
        if (btn) btn.textContent = logVisible ? 'Журнал ▴' : 'Журнал ▾';
        if (logVisible) fetchLog();
    };

    function fetchLog() {
        var box = el('ts_log');
        if (!box) return;
        box.textContent = 'Загрузка лога...';
        httpGetText(U_LOG, function(text) {
            box.textContent = text || 'Нет данных.';
            box.scrollTop = box.scrollHeight;
        });
    }

    /* ── updateUI ── */
    function updateUI(data) {
        if (!data) return;

        var controlsAllowed = !!(data.bin_present && data.init_present);
        var s = el('ts_status');
        var p = el('ts_pid');

        if (!controlsAllowed) {
            if (s) s.innerHTML = '<span style="color:#ffb74d">НЕТ DAEMON</span>';
            if (p) p.textContent = '';
            renderButtons(false, false);
            el('ts_mem').textContent = '0';
            el('ts_cpu').textContent = '0';
            el('mem_bar').style.width = '0%';
            pendingAction = null;
            return;
        }

        if (data.running) {
            if (s) s.innerHTML = '<span style="color:#4caf50">ЗАПУЩЕН</span>';
            /* FIX: PID теперь приходит в data.pid и отображается */
            if (p) p.textContent = data.pid ? 'PID: ' + data.pid : '';
            renderButtons(true, true);
            el('ts_mem').textContent = (data.mem_kb / 1024).toFixed(1);
            el('ts_cpu').textContent = data.ts_cpu;
        } else {
            if (p) p.textContent = '';
            if (pendingAction === 'stop') {
                if (s) s.innerHTML = '<span style="color:#ff9800">STOPPING...</span>';
            } else if (pendingAction === 'start' || pendingAction === 'restart') {
                if (s) s.innerHTML = '<span style="color:#ff9800">STARTING...</span>';
            } else {
                if (s) s.innerHTML = '<span style="color:#f44336">ОСТАНОВЛЕН</span>';
            }
            renderButtons(false, true);
            el('ts_mem').textContent = '0';
            el('ts_cpu').textContent = '0';
            el('mem_bar').style.width = '0%';
        }

        if (data.sys_mem && data.sys_mem.total > 0) {
            var freeMb  = (data.sys_mem.available / 1024).toFixed(0);
            var totalMb = (data.sys_mem.total      / 1024).toFixed(0);
            el('mem_details').textContent = 'Free: ' + freeMb + ' MB | Total: ' + totalMb + ' MB';
            if (data.running) {
                var pct = (data.mem_kb / data.sys_mem.total) * 100;
                el('mem_bar').style.width = Math.max(pct, 1) + '%';
            }
        }

        var txt = [];
        if (data.cores) {
            for (var i = 0; i < 4; i++) {
                var val = parseFloat(data.cores[i]) || 0;
                setBarHeight('c' + i, val);
                txt.push(Math.round(val) + '%');
            }
        }
        el('cores_txt').textContent = txt.join(' | ');

        if (pendingAction === 'start'   && data.running)  pendingAction = null;
        if (pendingAction === 'restart' && data.running)  pendingAction = null;
        if (pendingAction === 'stop'    && !data.running) pendingAction = null;
        if (!pendingAction) clearButtonsBusy();
    }

    function forceUpdate() {
        httpGet(U_STAT, function(xhr, data) { updateUI(data); });
    }

    function schedulePoll() {
        setTimeout(function() {
            forceUpdate();
            schedulePoll();
        }, nextPollDelay());
    }

    /* FIX: запуск только после полной готовности DOM */
    if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', function() {
            forceUpdate();
            schedulePoll();
        });
    } else {
        /* DOMContentLoaded уже случился (LuCI рендерит виджеты постепенно) */
        forceUpdate();
        schedulePoll();
    }

})();
</script>
]]

