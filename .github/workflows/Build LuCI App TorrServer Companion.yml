name: Build LuCI App TorrServer Companion

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Package version, e.g. 2.0.0'
        required: true
        default: '2.0.0'

jobs:
  release:
    name: Build and Release luci-app-torrserver
    runs-on: ubuntu-latest
    permissions:
      contents: write

    env:
      PKG_NAME: luci-app-torrserver
      PKG_ARCH_IPK: all
      PKG_ARCH_APK: noarch

    steps:
      - name: Resolve package metadata
        shell: bash
        run: |
          set -euxo pipefail
          PKG_VERSION="${{ github.event.inputs.version }}"
          RELEASE_TAG="v${PKG_VERSION}"
          RELEASE_NAME="LuCI App TorrServer ${PKG_VERSION}"
          {
            echo "PKG_VERSION=${PKG_VERSION}"
            echo "RELEASE_TAG=${RELEASE_TAG}"
            echo "RELEASE_NAME=${RELEASE_NAME}"
          } >> "${GITHUB_ENV}"

      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Install packaging tools
        shell: bash
        run: |
          set -euxo pipefail
          sudo apt-get update
          sudo apt-get install -y curl tar xz-utils dos2unix
          NFPM_VER="2.43.1"
          curl -fsSL "https://github.com/goreleaser/nfpm/releases/download/v${NFPM_VER}/nfpm_${NFPM_VER}_Linux_x86_64.tar.gz" | tar -xz
          sudo install -m 0755 nfpm /usr/local/bin/nfpm

      - name: Prepare package root
        shell: bash
        run: |
          set -euxo pipefail
          mkdir -p \
            root/usr/share/luci/menu.d \
            root/usr/share/rpcd/acl.d \
            root/usr/share/ucode/luci/controller \
            root/www/luci-static/resources/view/torrserver \
            packaging

          cp luci/menu.d/luci-app-torrserver.json \
             root/usr/share/luci/menu.d/luci-app-torrserver.json

          cp luci/acl.d/luci-app-torrserver.json \
             root/usr/share/rpcd/acl.d/luci-app-torrserver.json

          cp luci/controller/torrserver.uc \
             root/usr/share/ucode/luci/controller/torrserver.uc

          cp luci/view/torrserver/overview.js \
             root/www/luci-static/resources/view/torrserver/overview.js

          dos2unix \
            root/usr/share/luci/menu.d/luci-app-torrserver.json \
            root/usr/share/rpcd/acl.d/luci-app-torrserver.json \
            root/usr/share/ucode/luci/controller/torrserver.uc \
            root/www/luci-static/resources/view/torrserver/overview.js

      - name: Create package scripts
        shell: bash
        run: |
          set -euxo pipefail

          cat > packaging/postinstall.sh <<EOF
          #!/bin/sh
          echo "============================================================"
          echo " Installed ${PKG_NAME} version ${PKG_VERSION}"
          echo " View: /www/luci-static/resources/view/torrserver/overview.js"
          echo " Menu: /usr/share/luci/menu.d/luci-app-torrserver.json"
          echo " ACL:  /usr/share/rpcd/acl.d/luci-app-torrserver.json"
          echo " Expected daemon binary : /usr/bin/torrserver"
          echo " Expected init script   : /etc/init.d/torrserver"
          echo "============================================================"
          [ -n "\${IPKG_INSTROOT}" ] && exit 0
          /etc/init.d/rpcd reload  >/dev/null 2>&1 || true
          /etc/init.d/uhttpd reload >/dev/null 2>&1 || true
          [ ! -x /usr/bin/torrserver ]    && echo "[postinstall] warning: /usr/bin/torrserver not found"
          [ ! -x /etc/init.d/torrserver ] && echo "[postinstall] warning: /etc/init.d/torrserver not found"
          echo "[postinstall] done."
          exit 0
          EOF

          cat > packaging/preremove.sh <<'EOF'
          #!/bin/sh
          [ -n "${IPKG_INSTROOT}" ] && exit 0
          /etc/init.d/rpcd reload  >/dev/null 2>&1 || true
          /etc/init.d/uhttpd reload >/dev/null 2>&1 || true
          echo "[preremove] done."
          exit 0
          EOF

          cat > packaging/postremove.sh <<'EOF'
          #!/bin/sh
          echo "luci-app-torrserver removed. Daemon config preserved."
          exit 0
          EOF

          chmod 0755 packaging/postinstall.sh packaging/preremove.sh packaging/postremove.sh

      - name: Build IPK and APK packages
        shell: bash
        run: |
          set -euxo pipefail
          export SOURCE_DATE_EPOCH=1704067200
          export PKG_DESC="LuCI web interface for TorrServer on OpenWrt (ucode view, no CBI)"

          cat > nfpm_ipk.yaml <<EOF
          name: ${PKG_NAME}
          arch: ${PKG_ARCH_IPK}
          platform: linux
          version: ${PKG_VERSION}
          section: luci
          priority: optional
          maintainer: ${GITHUB_REPOSITORY_OWNER}
          description: "${PKG_DESC}"
          homepage: https://github.com/${GITHUB_REPOSITORY}
          license: MIT
          depends:
            - luci-base
            - rpcd
            - rpcd-mod-file
          contents:
            - src: ./root/usr/share/luci/menu.d/luci-app-torrserver.json
              dst: /usr/share/luci/menu.d/luci-app-torrserver.json
              file_info:
                mode: 0644
                mtime: 2024-01-01T00:00:00Z
            - src: ./root/usr/share/rpcd/acl.d/luci-app-torrserver.json
              dst: /usr/share/rpcd/acl.d/luci-app-torrserver.json
              file_info:
                mode: 0644
                mtime: 2024-01-01T00:00:00Z
            - src: ./root/usr/share/ucode/luci/controller/torrserver.uc
              dst: /usr/share/ucode/luci/controller/torrserver.uc
              file_info:
                mode: 0644
                mtime: 2024-01-01T00:00:00Z
            - src: ./root/www/luci-static/resources/view/torrserver/overview.js
              dst: /www/luci-static/resources/view/torrserver/overview.js
              file_info:
                mode: 0644
                mtime: 2024-01-01T00:00:00Z
          scripts:
            postinstall: ./packaging/postinstall.sh
            preremove:   ./packaging/preremove.sh
            postremove:  ./packaging/postremove.sh
          EOF

          nfpm package --config nfpm_ipk.yaml --packager ipk \
            --target "${PKG_NAME}_${PKG_VERSION}_${PKG_ARCH_IPK}.ipk"
          test -f "${PKG_NAME}_${PKG_VERSION}_${PKG_ARCH_IPK}.ipk"

          cat > nfpm_apk.yaml <<EOF
          name: ${PKG_NAME}
          arch: ${PKG_ARCH_APK}
          platform: linux
          version: ${PKG_VERSION}
          section: luci
          priority: optional
          maintainer: ${GITHUB_REPOSITORY_OWNER}
          description: "${PKG_DESC}"
          homepage: https://github.com/${GITHUB_REPOSITORY}
          license: MIT
          depends:
            - luci-base
            - rpcd
            - rpcd-mod-file
          contents:
            - src: ./root/usr/share/luci/menu.d/luci-app-torrserver.json
              dst: /usr/share/luci/menu.d/luci-app-torrserver.json
              file_info:
                mode: 0644
            - src: ./root/usr/share/rpcd/acl.d/luci-app-torrserver.json
              dst: /usr/share/rpcd/acl.d/luci-app-torrserver.json
              file_info:
                mode: 0644
            - src: ./root/usr/share/ucode/luci/controller/torrserver.uc
              dst: /usr/share/ucode/luci/controller/torrserver.uc
              file_info:
                mode: 0644
            - src: ./root/www/luci-static/resources/view/torrserver/overview.js
              dst: /www/luci-static/resources/view/torrserver/overview.js
              file_info:
                mode: 0644
          scripts:
            postinstall: ./packaging/postinstall.sh
            preremove:   ./packaging/preremove.sh
            postremove:  ./packaging/postremove.sh
          EOF

          nfpm package --config nfpm_apk.yaml --packager apk \
            --target "${PKG_NAME}_${PKG_VERSION}_${PKG_ARCH_APK}.apk"
          test -f "${PKG_NAME}_${PKG_VERSION}_${PKG_ARCH_APK}.apk"

      - name: Generate Packages index for opkg feed
        shell: bash
        run: |
          set -euxo pipefail
          # Packages.gz позволяет добавить GitHub Release как opkg feed.
          # После этого пакет виден в LuCI Package Manager.
          for ipk in *.ipk; do
            ar x "${ipk}" control.tar.gz 2>/dev/null || true
            if [ -f control.tar.gz ]; then
              tar -xzf control.tar.gz ./control 2>/dev/null ||               tar -xzf control.tar.gz control    2>/dev/null || true
              rm -f control.tar.gz
            fi
            if [ -f control ]; then
              cat control
              printf "Filename: %s\n" "${ipk}"
              printf "Size: %s\n"     "$(stat -c%s "${ipk}")"
              printf "SHA256sum: %s\n" "$(sha256sum "${ipk}" | cut -d' ' -f1)"
              printf "\n"
              rm -f control
            fi
          done > Packages
          gzip -k Packages
          echo "=== Packages ===" && cat Packages

      - name: Generate checksums
        shell: bash
        run: |
          set -euxo pipefail
          sha256sum *.ipk *.apk Packages Packages.gz > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Upload build artifacts
        uses: actions/upload-artifact@v5
        with:
          name: luci-app-torrserver-${{ env.PKG_VERSION }}
          if-no-files-found: error
          path: |
            *.ipk
            *.apk
            Packages
            Packages.gz
            SHA256SUMS.txt

      - name: Create or update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name:     ${{ env.RELEASE_NAME }}
          body: |
            ## Установка

            ### Через opkg напрямую
            ```
            opkg install https://github.com/${{ github.repository }}/releases/download/${{ env.RELEASE_TAG }}/luci-app-torrserver_${{ env.PKG_VERSION }}_all.ipk
            ```

            ### Как постоянный feed (виден в LuCI Package Manager)
            Добавить в `/etc/opkg/customfeeds.conf`:
            ```
            src/gz luci-torrserver https://github.com/${{ github.repository }}/releases/download/${{ env.RELEASE_TAG }}
            ```
            Затем `opkg update && opkg install luci-app-torrserver`
          files: |
            *.ipk
            *.apk
            Packages
            Packages.gz
            SHA256SUMS.txt
          draft:      false
          prerelease: false
