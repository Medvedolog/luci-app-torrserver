LUA_MODEL

          dos2unix \
            root/usr/lib/lua/luci/controller/torrserver.lua \
            root/usr/lib/lua/luci/model/cbi/torrserver.lua

      - name: Create package scripts
        shell: bash
        run: |
          set -euxo pipefail

          cat > packaging/postinstall.sh <<EOF
          #!/bin/sh
          echo ""
          echo "============================================================"
          echo " Installed ${PKG_NAME} version ${PKG_VERSION}"
          echo " This package is only a LuCI companion."
          echo " Expected daemon binary : /usr/bin/torrserver"
          echo " Expected init script   : /etc/init.d/torrserver"
          echo "============================================================"

          [ -n "\${IPKG_INSTROOT}" ] && exit 0

          rm -f /tmp/luci-indexcache /tmp/luci-modulecache 2>/dev/null || true
          rm -f /tmp/opkg-lists/* 2>/dev/null || true
          /etc/init.d/rpcd reload >/dev/null 2>&1 || true
          /etc/init.d/uhttpd reload >/dev/null 2>&1 || true

          if [ ! -x /usr/bin/torrserver ]; then
              echo "[postinstall] warning: /usr/bin/torrserver not found"
          fi

          if [ ! -x /etc/init.d/torrserver ]; then
              echo "[postinstall] warning: /etc/init.d/torrserver not found"
          fi

          echo "[postinstall] LuCI cache cleared."
          echo "[postinstall] done."
          exit 0
          EOF

          cat > packaging/preremove.sh <<'EOF'
          #!/bin/sh
          echo ""
          echo "============================================================"
          echo " Removing luci-app-torrserver"
          echo " TorrServer daemon package remains installed."
          echo "============================================================"

          [ -n "${IPKG_INSTROOT}" ] && exit 0

          rm -f /tmp/luci-indexcache /tmp/luci-modulecache 2>/dev/null || true
          /etc/init.d/rpcd reload >/dev/null 2>&1 || true
          /etc/init.d/uhttpd reload >/dev/null 2>&1 || true

          echo "[preremove] LuCI cache cleared."
          echo "[preremove] done."
          exit 0
          EOF

          cat > packaging/postremove.sh <<'EOF'
          #!/bin/sh
          echo ""
          echo "============================================================"
          echo " luci-app-torrserver removed"
          echo " No daemon config or TorrServer data was deleted."
          echo "============================================================"
          exit 0
          EOF

          chmod 0755 \
            packaging/postinstall.sh \
            packaging/preremove.sh \
            packaging/postremove.sh

      - name: Build IPK and APK packages
        shell: bash
        run: |
          set -euxo pipefail

          export SOURCE_DATE_EPOCH=1704067200
          export PKG_DESC="Simple LuCI web interface for managing TorrServer on OpenWrt"

          cat > nfpm_ipk.yaml <<EOF
          name: ${PKG_NAME}
          arch: ${PKG_ARCH_IPK}
          platform: linux
          version: ${PKG_VERSION}
          section: luci
          priority: optional
          maintainer: ${GITHUB_REPOSITORY_OWNER}
          description: "${PKG_DESC}"
          homepage: https://github.com/${GITHUB_REPOSITORY}
          license: MIT

          depends:
            - luci-base
            - luci-compat

          contents:
            - src: ./root/usr/lib/lua/luci/controller/torrserver.lua
              dst: /usr/lib/lua/luci/controller/torrserver.lua
              file_info:
                mode: 0644
                mtime: 2024-01-01T00:00:00Z

            - src: ./root/usr/lib/lua/luci/model/cbi/torrserver.lua
              dst: /usr/lib/lua/luci/model/cbi/torrserver.lua
              file_info:
                mode: 0644
                mtime: 2024-01-01T00:00:00Z

          scripts:
            postinstall: ./packaging/postinstall.sh
            preremove:   ./packaging/preremove.sh
            postremove:  ./packaging/postremove.sh
          EOF

          nfpm package --config nfpm_ipk.yaml --packager ipk \
            --target "${PKG_NAME}_${PKG_VERSION}_${PKG_ARCH_IPK}.ipk"
          test -f "${PKG_NAME}_${PKG_VERSION}_${PKG_ARCH_IPK}.ipk"

          cat > nfpm_apk.yaml <<EOF
          name: ${PKG_NAME}
          arch: ${PKG_ARCH_APK}
          platform: linux
          version: ${PKG_VERSION}
          section: luci
          priority: optional
          maintainer: ${GITHUB_REPOSITORY_OWNER}
          description: "${PKG_DESC}"
          homepage: https://github.com/${GITHUB_REPOSITORY}
          license: MIT

          depends:
            - luci-base
            - luci-compat

          contents:
            - src: ./root/usr/lib/lua/luci/controller/torrserver.lua
              dst: /usr/lib/lua/luci/controller/torrserver.lua
              file_info:
                mode: 0644

            - src: ./root/usr/lib/lua/luci/model/cbi/torrserver.lua
              dst: /usr/lib/lua/luci/model/cbi/torrserver.lua
              file_info:
                mode: 0644

          scripts:
            postinstall: ./packaging/postinstall.sh
            preremove:   ./packaging/preremove.sh
            postremove:  ./packaging/postremove.sh
          EOF

          nfpm package --config nfpm_apk.yaml --packager apk \
            --target "${PKG_NAME}_${PKG_VERSION}_${PKG_ARCH_APK}.apk"
          test -f "${PKG_NAME}_${PKG_VERSION}_${PKG_ARCH_APK}.apk"

      - name: Show built files
        shell: bash
        run: |
          set -euxo pipefail
          echo "IPK:"; ls -la *.ipk
          echo "APK:"; ls -la *.apk

      - name: Generate checksums
        shell: bash
        run: |
          set -euxo pipefail
          sha256sum *.ipk *.apk > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Upload build artifacts
        uses: actions/upload-artifact@v5
        with:
          name: luci-app-torrserver-${{ env.PKG_VERSION }}
          if-no-files-found: error
          path: |
            *.ipk
            *.apk
            SHA256SUMS.txt

      - name: Create or update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name:     ${{ env.RELEASE_NAME }}
          files: |
            *.ipk
            *.apk
            SHA256SUMS.txt
          draft:      false
          prerelease: false
